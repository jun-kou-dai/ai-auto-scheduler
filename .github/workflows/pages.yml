name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'claude/ai-scheduler-web-mvp-u3w4B']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx expo export --platform web
        env:
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: 472887512782-ss2q5s9uhim0h1j62rqtua5kdt6ns01g.apps.googleusercontent.com
          EXPO_PUBLIC_AI_PROVIDER: gemini

      - run: node scripts/postbuild.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
